releaseNotes: >-
  v2.0.0: Complete architecture rewrite — forked Ground Station, single container,
  Socket.IO, Redux, MUI v7, Web Worker waterfall, multi-SDR support, PlutoSDR TX+RX
  via pyadi-iio, SQLAlchemy + Alembic, all existing BitLink21 features preserved.
