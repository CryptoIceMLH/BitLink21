manifestVersion: 1.1
id: cryptoice-bitlink21
name: BitLink21
tagline: Bitcoin decentralized satellite communication system
icon: cryptoice-bitlink21/bitlink21-128.png
category: bitcoin
version: "3.0.0"
port: 7000
description: >-
  BitLink21 is a Bitcoin-native decentralized communication system that transmits
  encrypted messages, Bitcoin transactions, and Lightning invoices over satellite
  links using the Satoshi Signal Protocol (SSP). No internet required between nodes.

  Features: 52 modulation schemes via GNU Radio, NIP-04 encryption, FEC coding,
  beacon AFC for QO-100, PlutoSDR TX+RX, CSMA, constellation diagram, BER testing,
  full waterfall/satellite tracking from Ground Station fork.
developer: BitLink21 Contributors
