version: '3.8'

# Development variant - use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Adds live reloading for source files and relaxed restart policies

services:
  bitlink21-radio:
    build:
      context: ./radio
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      DEBUG: "true"

  bitlink21-core:
    restart: on-failure
    environment:
      DEBUG: "true"
    # Keep the volume mounts for live code editing
    volumes:
      - ./data/core:/app/data
      - ./core/src:/app/src

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile.dev  # Use development Dockerfile
    restart: on-failure
    environment:
      DEBUG: "true"
      REACT_APP_API_URL: "http://localhost:8021"
    # Keep the volume mounts for live code editing
    volumes:
      - ./web-ui/src:/app/src
      - ./web-ui/public:/app/public
      - /app/node_modules  # Preserve node_modules in container
    stdin_open: true
    tty: true
