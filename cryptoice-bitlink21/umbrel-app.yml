name: BitLink21
tagline: Bitcoin satellite communication via QO-100
icon: https://raw.githubusercontent.com/CryptoIceMLH/BitLink21/master/cryptoice-bitlink21/bitlink21-128.png
category: bitcoin
version: "0.5.0"
port: 3000
description: >-
  BitLink21 is a self-hosted satellite communications layer for Bitcoin and Lightning.
  Send encrypted Bitcoin transactions, Lightning invoices, and messages over the QO-100
  geostationary satellite using a PlutoSDR — no internet required between nodes.

  Features:
  - Real-time waterfall spectrum display (2048-bin FFT, WebGL-rendered)
  - All 52 liquid-dsp modulation schemes (BPSK to QAM256)
  - Nostr NIP-04 encryption (AES-256-CBC + ECDH secp256k1)
  - Bitcoin transaction relay over satellite
  - Lightning invoice relay
  - CSMA collision avoidance
  - PlutoSDR SDR hardware integration
