manifestVersion: 1.1
id: cryptoice-bitlink21
name: BitLink21
tagline: Bitcoin decentralized satellite communication system
icon: https://raw.githubusercontent.com/CryptoIceMLH/BitLink21/master/cryptoice-bitlink21/bitlink21-128.png
category: bitcoin
version: "2.3.0"
port: 7000
description: >-
  BitLink21 is a self-hosted satellite communications layer for Bitcoin and Lightning.
  Send encrypted Bitcoin transactions, Lightning invoices, and messages over satellite
  using SDR hardware — no internet required between nodes.

  Features:
  - Multi-SDR support (RTL-SDR, SoapySDR, UHD/USRP, HackRF, Airspy, LimeSDR, PlutoSDR)
  - PlutoSDR TX+RX via pyadi-iio (full duplex, burst TX for SSP frames)
  - Web Worker waterfall with 7 color maps and auto-scaling
  - Nostr NIP-04 encryption (AES-256-CBC + ECDH secp256k1)
  - Bitcoin transaction relay over satellite
  - Lightning invoice relay
  - Satellite tracking, rotator control, scheduled observations
  - Socket.IO real-time communication
  - Material-UI v7 + Redux Toolkit frontend
developer: BitLink21 Contributors
