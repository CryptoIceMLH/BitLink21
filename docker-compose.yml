# BitLink21 v2.0.0 — Single Container Architecture
# Forked from Ground Station + BitLink21 features (SSP, NIP-04, Bitcoin/Lightning, PlutoSDR TX+RX)

services:
  bitlink21:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        BUILD_VERSION: ${BUILD_VERSION:-2.0.0}
    container_name: bitlink21
    environment:
      # PlutoSDR configuration
      PLUTO_URI: "${PLUTO_URI:-ip:192.168.1.200}"
      # BitLink21 specific
      BITLINK21_DB_PATH: "/app/backend/data/bitlink21.db"
      # Bitcoin Core RPC (optional)
      BITCOIN_RPC_URL: "${BITCOIN_RPC_URL:-}"
      BITCOIN_RPC_USER: "${BITCOIN_RPC_USER:-}"
      BITCOIN_RPC_PASS: "${BITCOIN_RPC_PASS:-}"
      # LND REST (optional)
      LND_REST_URL: "${LND_REST_URL:-}"
    ports:
      - "${BITLINK21_PORT:-7000}:7000"
    volumes:
      - ./data:/app/backend/data
    # Uncomment to pass through USB devices for SDR hardware (RTL-SDR, HackRF, etc.):
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
    privileged: false
    restart: unless-stopped
