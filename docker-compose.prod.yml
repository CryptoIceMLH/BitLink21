version: '3.8'

# Production variant - use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# Removes development volume mounts, adds resource limits, and optimizes image management

services:
  bitlink21-radio:
    image: bitlink21-radio:latest
    restart: always
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        cpus: '1'
        memory: 1G
    volumes:
      - ./data/radio:/app/data
    # Remove src/ volume mount for production

  bitlink21-core:
    image: bitlink21-core:latest
    restart: always
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        cpus: '1'
        memory: 1G
    volumes:
      - ./data/core:/app/data
    # Remove src/ volume mount for production
    depends_on:
      - bitlink21-radio

  web-ui:
    image: bitlink21-ui:latest
    restart: always
    resources:
      limits:
        cpus: '1'
        memory: 1G
      reservations:
        cpus: '0.5'
        memory: 512M
    # Remove src/ volume mount for production
    depends_on:
      - bitlink21-core
